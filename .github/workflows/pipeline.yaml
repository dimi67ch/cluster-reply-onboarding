name: Terraform Azure Apply

# Trigger: Wann der Workflow gestartet wird
on:
  push:
    branches: ["main"]
    paths:
      - "main.tf"
      - ".github/workflows/pipeline.yaml"

# Minimale Rechte für den Workflow (lesend auf Repo)
permissions:
  contents: read

# Globale Umgebungsvariablen für alle Jobs
env:
  TF_IN_AUTOMATION: "true"  # Terraform läuft im Automationsmodus (CI/CD)
  TF_INPUT: "false"         # verhindert interaktive Eingaben
  TF_WORKING_DIR: "."       # Arbeitsverzeichnis (Root des Repos)

# Azure Authentifizierungsvariablen für Terraform (azurerm provider + backend)
  ARM_SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}   # Azure Subscription ID
  ARM_TENANT_ID:       ${{ secrets.TENANT_ID }}         # Azure Tenant ID
  ARM_CLIENT_ID:       ${{ secrets.CLIENT_ID }}         # Service Principal Client ID
  ARM_CLIENT_SECRET:   ${{ secrets.CLIENT_SECRET }}     # Service Principal Secret
  ARM_USE_AZUREAD:     "true"                           # Authentifizierung über Azure AD

jobs:
  # Dieser Job berechnet, welche Änderungen Terraform durchführen würde
  plan:
    # Job läuft auf einer Ubuntu GitHub Runner VM
    runs-on: ubuntu-latest

    steps:
      # Repository-Code auschecken
      - uses: actions/checkout@v4

      # Login bei Azure mit Service Principal
      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # AZURE_CREDENTIALS setzt sich so zusammen:
          #  {
          #    "clientId": "APP_CLIENT_ID",
          #    "clientSecret": "APP_CLIENT_SECRET",
          #    "subscriptionId": "SUBSCRIPTION_ID",
          #    "tenantId": "TENANT_ID"
          #  }

      # Installiert Terraform auf dem Runner
      - uses: hashicorp/setup-terraform@v3

      # Terraform initialisieren (Provider + Backend laden)
      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -no-color

      # Terraform Plan erstellen (zeigt geplante Änderungen)
      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan

      # Speichert den Plan als Artefakt für den nächsten Job
      - name: Upload tfplan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  # Dieser Job führt die Änderungen wirklich aus
  apply:
    # läuft erst nachdem der plan Job erfolgreich war
    needs: plan
    runs-on: ubuntu-latest
    # nutzt GitHub Environment "production" (approval nötig)
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3

      # Terraform Plan aus dem vorherigen Job herunterladen
      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -no-color

      # Führt den vorher berechneten Plan aus
      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -no-color -auto-approve tfplan